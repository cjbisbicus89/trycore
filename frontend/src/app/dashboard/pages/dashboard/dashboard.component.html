<div class="container">
  @if (isLoading()) {
    <div class="loading">
      <div class="skeleton-header"></div>
      <div class="skeleton-cards"></div>
      <div class="skeleton-table"></div>
    </div>
  } @else if (error()) {
    <div class="error-state">
      <p>{{ error() }}</p>
      <button class="btn-back" (click)="goBack()">Volver</button>
    </div>
  } @else if (project()) {
    <div class="header">
      <button class="btn-back" (click)="goBack()">← Volver</button>
      <div class="header-content">
        <h1 class="project-name">{{ project()!.name }}</h1>
        <p class="project-description">{{ project()!.description }}</p>
      </div>
      <button class="btn-primary" (click)="openCreateModal()">Nueva Actividad</button>
    </div>

    @if (consolidatedIndicators()) {
      <app-evm-summary [evmIndicators]="consolidatedIndicators()!" />
    }

    <div class="activities-section">
      <h2 class="section-title">Actividades</h2>
      <app-activity-table
        [activities]="activities()"
        (edit)="openEditModal($event)"
        (delete)="onActivityDeleted($event)"
      />
    </div>

    @if (activities().length > 0) {
      <div class="chart-section">
        <h2 class="section-title">Gráfica EVM</h2>
        <app-evm-chart [activities]="activities()" />
      </div>
    }

    @if (showModal()) {
      <app-activity-form-modal
        [projectId]="project()!.id"
        [activity]="selectedActivity()"
        [isOpen]="showModal()"
        (saved)="onActivitySaved()"
        (cancelled)="closeModal()"
      />
    }
  }
</div>
