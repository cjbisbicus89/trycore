<div class="summary-grid">
  <app-indicator-card
    label="PV (Planned Value)"
    [value]="evmIndicators().plannedValue"
    [status]="getPvStatus()"
  />
  <app-indicator-card
    label="EV (Earned Value)"
    [value]="evmIndicators().earnedValue"
    [status]="getEvStatus()"
  />
  <app-indicator-card
    label="AC (Actual Cost)"
    [value]="evmIndicators().actualCost"
    [status]="getAcStatus()"
  />
  <app-indicator-card
    label="CV (Cost Variance)"
    [value]="evmIndicators().costVariance"
    [status]="getCvStatus()"
  />
  <app-indicator-card
    label="SV (Schedule Variance)"
    [value]="evmIndicators().scheduleVariance"
    [status]="getSvStatus()"
  />
  <app-indicator-card
    label="CPI (Cost Performance Index)"
    [value]="evmIndicators().costPerformanceIndex"
    [status]="getCpiStatus()"
  />
  <app-indicator-card
    label="SPI (Schedule Performance Index)"
    [value]="evmIndicators().schedulePerformanceIndex"
    [status]="getSpiStatus()"
  />
  <app-indicator-card
    label="Estado Costo"
    [value]="null"
    [status]="getOverallStatus()"
  />
</div>
