services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: evm_db
      POSTGRES_USER: evm_user
      POSTGRES_PASSWORD: evm_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evm_user -d evm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/EVM.ProjectManagement.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__Default: "Host=db;Database=evm_db;Username=evm_user;Password=evm_pass"
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
